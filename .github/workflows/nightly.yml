name: nightly.yml

on:
    push:
        branches:
            - main

# No top-level write permissions — jobs declare only what they need.
permissions: {}

jobs:
    find-configs:
        name: 📇 Find configs
        uses: ./.github/workflows/find-configs.yml

    build:
        name: 🏗️ Build nightly (${{ matrix.config }})
        runs-on: ubuntu-latest
        needs:
            - find-configs
        strategy:
            matrix:
                config: ${{ fromJson(needs.find-configs.outputs.configs) }}
            fail-fast: false
        permissions:
            id-token: write
            attestations: write
            contents: read
        steps:
            - name: 📥️ Checkout
              uses: actions/checkout@v6

            - name: 🏗️ Build nightly for ${{ matrix.config }}
              id: build
              uses: ./.github/actions/build
              with:
                  config: ${{ matrix.config }}
                  nightly: true

            - name: 🦭 Attest build provenance
              uses: actions/attest-build-provenance@v4
              with:
                  subject-name: ${{ steps.build.outputs.script }}
                  subject-digest: sha256:${{ steps.build.outputs.digest }}
                  show-summary: true

    release:
        name: 🌙 Update nightly release
        runs-on: ubuntu-latest
        needs:
            - build
        permissions:
            contents: write
        steps:
            - name: 📥️ Checkout
              uses: actions/checkout@v6
              with:
                  # Full history needed so git describe can find the last stable tag
                  fetch-depth: 0

            - name: 📦 Download all nightly build artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: better-moodle-*.user.js
                  path: dist/
                  merge-multiple: true

            - name: 📦 Download all nightly meta artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: better-moodle-*.meta.js
                  path: dist/
                  merge-multiple: true

            - name: 📦 Download all nightly polyfill artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: better-moodle-*-polyfills.js
                  path: dist/
                  merge-multiple: true

            - name: 🧪 List contents downloded (debug)
              run: |
                  tree dist

                  tree .

            - name: 🔍 Find open release-please PR (proposed changelog)
              id: rp-pr
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # Find the open release-please PR by its label.
                  # Its body already contains the release-please-generated changelog,
                  # respecting .release-please-config.json.
                  # Falls back gracefully to empty if no PR exists (e.g. right after a release).
                  body=$(
                    gh pr list \
                      --label "autorelease: pending" \
                      --state open \
                      --limit 1 \
                      --json body \
                      --jq '.[0].body // ""'
                  )

                  # Strip the release-please robot header and footer, keeping
                  # only the actual changelog markdown between the two --- separators.
                  changelog=$(echo "$body" | awk '
                    /^---$/ { count++; next }
                    count == 1 { print }
                  ' | sed '/^This PR was generated with/d' | sed '/^\s*$/{ /./!d }')

                  # Write to a temp file to safely handle multi-line content
                  echo "$changelog" > /tmp/rp-changelog.md
                  echo "has_changelog=$([ -s /tmp/rp-changelog.md ] && echo true || echo false)" >> $GITHUB_OUTPUT

            - name: 🏷️ Read nightly version from build artifact
              id: version
              run: |
                  # Extract @version from the first available meta file.
                  # The version string was set by the build tooling and is the single source of truth.
                  META=$(ls dist/better-moodle-*.meta.js | head -1)
                  VERSION=$(grep -m1 '// @version' "$META" | awk '{print $3}')
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  echo "Nightly version: ${VERSION}"

            - name: 📝 Compose release body
              id: body
              run: |
                  COMMIT_SHA="${{ github.sha }}"
                  SHORT_SHA="${COMMIT_SHA:0:7}"
                  COMMIT_URL="https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}"
                  VERSION="${{ steps.version.outputs.version }}"

                  RAW_TIMESTAMP="${VERSION##*+}"
                  TIMESTAMP=$(echo "$RAW_TIMESTAMP" | sed 's/\(....\)\(..\)\(..\)\(..\)\(..\).*/\1-\2-\3 \4:\5 UTC/')

                  # Find last stable release tag to compute commits since then
                  LAST_TAG=$(git describe --tags --abbrev=0 --match "[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo "")
                  if [ -n "$LAST_TAG" ]; then
                    COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) %s")
                    COMMIT_RANGE="since \`${LAST_TAG}\`"
                  else
                    COMMITS=$(git log --pretty=format:"- [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) %s" | head -30)
                    COMMIT_RANGE="(no stable tag found)"
                  fi

                  {
                    echo "## 🌙 Better-Moodle Nightly"
                    echo ""
                    echo "> [!WARNING]"
                    echo "> **This is a nightly build.** It reflects the current state of the \`main\` branch and may be unstable or incomplete."
                    echo "> Use this channel only if you want to test the latest changes before they are published as a stable release."
                    echo "> To return to the stable channel, reinstall Better-Moodle from the [latest stable release](https://github.com/${{ github.repository }}/releases/latest)."
                    echo ""
                    echo "**Built from:** [\`${SHORT_SHA}\`](${COMMIT_URL})"
                    echo "**Updated:** ${TIMESTAMP}"
                    echo ""
                  } > /tmp/release-body.md

                  if [ "${{ steps.rp-pr.outputs.has_changelog }}" = "true" ]; then
                    {
                      echo "---"
                      echo ""
                      echo "## 📋 Proposed changelog for next stable release"
                      echo ""
                      echo "> [!NOTE]"
                      echo "> The following changelog is a **proposal** generated by release-please and reflects what the next stable release will likely contain."
                      echo ""
                      cat /tmp/rp-changelog.md
                      echo ""
                    } >> /tmp/release-body.md
                  fi

                  {
                    echo "---"
                    echo ""
                    echo "## 📜 Commits ${COMMIT_RANGE}"
                    echo ""
                    echo "$COMMITS"
                  } >> /tmp/release-body.md

                  echo "body_file=/tmp/release-body.md" >> $GITHUB_OUTPUT

            - name: 🔄 Delete existing nightly release assets
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # Remove all existing assets before uploading fresh ones.
                  # This ensures no stale assets remain if configs are added or renamed.
                  gh release view nightly --json assets --jq '.assets[].name' \
                    | xargs -I{} gh release delete-asset nightly {} --yes 2>/dev/null || true

            - name: 📤️ Upload nightly release assets & update release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION="${{ steps.version.outputs.version }}"

                  # Build upload argument list with display names (mirrors release-please.yml convention)
                  UPLOAD_ARGS=()
                  for script in dist/better-moodle-*.user.js; do
                    config=$(basename "$script" .user.js | sed 's/better-moodle-//')
                    meta="dist/better-moodle-${config}.meta.js"
                    polyfills="dist/better-moodle-${config}-polyfills.js"

                    UPLOAD_ARGS+=("${script}#➡️ [${config}] ${VERSION}.user.js")
                    [ -f "$meta" ]      && UPLOAD_ARGS+=("${meta}#[${config}] ${VERSION}.meta.js")
                    [ -f "$polyfills" ] && UPLOAD_ARGS+=("${polyfills}#[${config}] ${VERSION}.polyfills.js")
                  done

                  gh release upload nightly "${UPLOAD_ARGS[@]}"

                  # Update release title and body
                  gh release edit nightly \
                    --title "[nightly] v${VERSION}" \
                    --notes-file "${{ steps.body.outputs.body_file }}"
