name: pr-comment.yml

# This workflow is the trusted counterpart to check.yml and build.yml.
#
# WHY THIS WORKFLOW EXISTS:
# GitHub Actions intentionally prevents pull_request events from forks from
# accessing repository secrets or writing to pull requests. This is a security
# feature: a malicious fork PR could otherwise steal secrets or modify the repo.
#
# However, we want to post a CI summary comment on every PR — including those
# from external contributors (forks).
#
# THE SOLUTION (workflow_run pattern):
# 1. check.yml / build.yml run in the untrusted fork context (no secrets, read-only).
#    They save their results as artifacts.
# 2. This workflow is triggered AFTER those workflows complete. It runs in the
#    trusted repository context, can access GITHUB_TOKEN with write permissions,
#    and posts the comment using the data from the artifacts.
#
# SECURITY GUARANTEE:
# Fork code is NEVER executed here. This workflow only reads artifact files
# (plain text) that were produced by the build/check workflows.
#
# REFERENCES:
# https://securitylab.github.com/resources/github-actions-new-patterns-and-mitigations/
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_run

on:
    workflow_run:
        # List all workflows that produce pr-summary-* artifacts.
        # The name must match the `name:` field of the respective workflow file exactly.
        workflows:
            - check.yml
            - build.yml
        types:
            - completed

# Write permission is needed to post/update the PR comment.
# All other permissions stay at the default (read or none).
permissions:
    pull-requests: write
    issues: write

jobs:
    post-pr-summary:
        runs-on: ubuntu-latest
        name: 📜 Post PR summary comment
        steps:
            - name: 📥️ checkout
              uses: actions/checkout@v6

            # Download all artifacts whose names start with "pr-summary-".
            # Each check (prettier, eslint, build) uploads one such artifact,
            # so a single run of this workflow handles all sections at once.
            - name: 📦 download PR summary artifacts
              uses: actions/download-artifact@v8
              with:
                  # The run-id of the triggering workflow (check.yml or build.yml),
                  # not this workflow's own run-id.
                  run-id: ${{ github.event.workflow_run.id }}
                  pattern: pr-summary-*
                  # merge-multiple puts all files into a single directory,
                  # but artifact names are preserved as subdirectory names.
                  merge-multiple: false
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  path: pr-summary-artifacts/

            # Post or update one PR comment section per downloaded artifact.
            # If no artifacts were uploaded (e.g. on a plain push, not a PR),
            # this step simply finds nothing and exits cleanly.
            - name: 📜 post PR summary sections
              shell: bash
              run: |
                  # if there was only one a-rtifact, move it into a subdir
                  if [[ $(find pr-summary-artifacts/* -maxdepth 0 -type d | wc -l) == 0 ]]; then
                      mkdir -p pr-summary-single
                      mv pr-summary-artifacts/* pr-summary-single/
                      mv pr-summary-single pr-summary-artifacts/
                  fi

                  # Iterate over each artifact subdirectory
                  for artifact_dir in pr-summary-artifacts/pr-summary-*/; do
                      [[ -d "$artifact_dir" ]] || continue

                      # Read the structured data saved by the upstream workflow.
                      # All files are plain text — no code from the fork is executed here.
                      PR_NUMBER=$(cat "$artifact_dir/pr-number" 2>/dev/null | tr -d '[:space:]')
                      SECTION=$(cat "$artifact_dir/section" 2>/dev/null)
                      TITLE=$(cat "$artifact_dir/title" 2>/dev/null)
                      CONTENT=$(cat "$artifact_dir/content" 2>/dev/null)

                      # Skip if required fields are missing (malformed artifact)
                      if [[ -z "$PR_NUMBER" || -z "$SECTION" || -z "$TITLE" ]]; then
                          echo "⚠️ Skipping incomplete artifact in $artifact_dir"
                          continue
                      fi

                      echo "📝 Posting section '$SECTION' to PR #$PR_NUMBER"

                      # Find an existing Better-Moodle PR Summary comment on this PR, if any.
                      COMMENT_URL=$(gh pr view "$PR_NUMBER" \
                          --repo "${{ github.repository }}" \
                          --json comments \
                          --jq '[.comments[] | select(.body | startswith("<!-- Better-Moodle PR-Summary -->"))][0].url')

                      # Build the new section block using HTML comment markers as delimiters.
                      # This allows each section (prettier, eslint, build) to be updated
                      # independently without affecting the rest of the comment.
                      START_MARKER="<!-- $SECTION -->"
                      END_MARKER="<!-- >$SECTION -->"
                      NOW=$(date)
                      RUN_LINK="Run: [\`${{ github.event.workflow_run.id }}/${{ github.event.workflow_run.run_attempt }}\`](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/attempts/${{ github.event.workflow_run.run_attempt }}) ($NOW)"

                      NEW_SECTION="$START_MARKER
                  <details>
                  <summary><h2>$TITLE</h2></summary>

                  $RUN_LINK

                  $CONTENT
                  </details>
                  $END_MARKER"

                      if [[ -z "$COMMENT_URL" ]]; then
                          # No summary comment exists yet — create a new one.
                          gh pr comment "$PR_NUMBER" \
                              --repo "${{ github.repository }}" \
                              --body "<!-- Better-Moodle PR-Summary -->
                  <h1>CI Summary</h1>

                  This comment summarizes the current state of CI of this PR.
                  It shows information about ESLint & Prettier, as well as how the builds changed to the base branch.

                  $NEW_SECTION"
                      else
                          # A summary comment already exists — update only the relevant section.
                          # We extract the comment ID from its URL (last numeric segment).
                          COMMENT_ID=$(echo "$COMMENT_URL" | sed 's/.*-\([0-9]*\)$/\1/')
                          BODY_FILE=$(mktemp)
                          NEW_BODY_FILE=$(mktemp)

                          # Fetch the current full comment body
                          gh pr view "$PR_NUMBER" \
                              --repo "${{ github.repository }}" \
                              --json comments \
                              --jq ".comments[] | select(.url == \"$COMMENT_URL\") | .body" > "$BODY_FILE"

                          # Rebuild the comment body:
                          # Copy everything outside the section's markers unchanged,
                          # then append the updated section at the end.
                          copy=true
                          while IFS="" read -r line || [[ -n "$line" ]]; do
                              if [[ "$line" == "$START_MARKER" ]]; then
                                  copy=false
                              fi
                              if [[ "$copy" == true ]]; then
                                  echo "$line" >> "$NEW_BODY_FILE"
                              fi
                              if [[ "$line" == "$END_MARKER" ]]; then
                                  copy=true
                              fi
                          done < "$BODY_FILE"

                          echo "$NEW_SECTION" >> "$NEW_BODY_FILE"

                          # Patch the comment via the REST API
                          gh api \
                              --method PATCH \
                              -H "Accept: application/vnd.github+json" \
                              -H "X-GitHub-Api-Version: 2022-11-28" \
                              "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                              -f body="$(cat "$NEW_BODY_FILE")"
                      fi
                  done
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
