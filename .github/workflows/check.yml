name: check.yml
on:
    push:
    pull_request:

# No top-level permissions here — each job declares only what it needs.
# Importantly: pull_request events from forks have no write access to secrets.
# PR comments are therefore NOT posted here — they are handled by pr-comment.yml,
# which runs via workflow_run (trusted context) and posts on behalf of this workflow.
permissions: {}

jobs:
    prettier:
        runs-on: ubuntu-latest
        name: 🍱 Prettier
        # Read-only: this job only checks code, never writes to the PR.
        permissions:
            contents: read
        steps:
            - name: 📥️ checkout
              uses: actions/checkout@v6

            - name: 🎛️ setup
              uses: ./.github/actions/setup

            - name: 🍱 run prettier
              run: yarn prettier:write

            - name: 🔢 count changes
              run: echo "CHANGES_COUNT=$(git status -s | wc -l)" >> $GITHUB_ENV

            - name: ✅ approve prettier result
              if: ${{ env.CHANGES_COUNT == 0 }}
              run: |
                  SUMMARY="✅ Prettier approves code"
                  echo "# $SUMMARY" >> $GITHUB_STEP_SUMMARY
                  echo "Running prettier on $(echo ${{ github.sha }} | head -c 7) did not result in any changes. 🎉" >> $GITHUB_STEP_SUMMARY
                  echo "PR_SUMMARY=$SUMMARY" >> $GITHUB_ENV
                  echo "EMOJI=✅" >> $GITHUB_ENV

            - name: 🖨️ print diff introduced by prettier
              if: ${{ env.CHANGES_COUNT > 0 }}
              run: git diff

            - name: ⚠️ warn over prettier result
              if: ${{ env.CHANGES_COUNT > 0 }}
              run: |
                  SUMMARY="⚠️ Prettier changed some code. Please see the summary and logs for more details."
                  echo "# $SUMMARY" >> $GITHUB_STEP_SUMMARY
                  echo "There were a total of **${{ env.CHANGES_COUNT }}** files affected by running prettier on $(echo ${{ github.sha }} | head -c 7):" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  git diff --compact-summary >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "For a complete diff introduced by prettier, please see the workflow logs." >> $GITHUB_STEP_SUMMARY
                  echo "PR_SUMMARY=$SUMMARY" >> $GITHUB_ENV
                  echo "EMOJI=⚠️" >> $GITHUB_ENV

            # Save the PR summary data as an artifact so that pr-comment.yml
            # (running in trusted context) can pick it up and post the comment.
            # This pattern is necessary because pull_request events from forks
            # do not have write access, so comments must be posted by a separate
            # trusted workflow triggered via workflow_run.
            - name: 💾 save PR summary data for comment workflow
              if: github.event_name == 'pull_request'
              run: |
                  mkdir -p pr-summary-data
                  echo '${{ github.event.pull_request.number }}' > pr-summary-data/pr-number
                  echo 'prettier' > pr-summary-data/section
                  printf '🎨${{ env.EMOJI }} Prettier' > pr-summary-data/title
                  # Write content to file to safely handle special characters
                  cat > pr-summary-data/content << 'EOF'
                  ${{ env.PR_SUMMARY }}
                  EOF

            - name: 📤 upload PR summary artifact
              if: github.event_name == 'pull_request'
              uses: actions/upload-artifact@v7
              with:
                  # Artifact name must be unique per workflow run section.
                  # pr-comment.yml downloads all artifacts matching pr-summary-*.
                  name: pr-summary-prettier
                  path: pr-summary-data/
                  # Artifacts are only needed until pr-comment.yml has posted the comment.
                  retention-days: 1

    eslint:
        runs-on: ubuntu-latest
        name: 🚨 ESLint
        # Read-only: ESLint annotations are written via checks API using GITHUB_TOKEN,
        # which works for internal branches. For forks, annotations may not appear
        # inline but the artifact-based PR comment will still be posted.
        permissions:
            contents: read
            checks: write
            pull-requests: read
        steps:
            - name: 📥️ checkout
              uses: actions/checkout@v6

            - name: 🎛️ setup
              uses: ./.github/actions/setup

            - name: 🌐 create i18n types
              run: yarn i18n:once

            - name: 🚨 run eslint
              run: yarn lint:fix -o .eslint-report.json --format json
              continue-on-error: true

            - name: 🖨  create annotations
              id: annotations
              uses: ataylorme/eslint-annotate-action@v3
              with:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  report-json: .eslint-report.json
                  only-pr-files: false
                  fail-on-warning: false
                  fail-on-error: true
                  check-name: ESLint Report Analysis
                  markdown-report-on-step-summary: true

            - name: 🙂 get summarizing emoji
              run: |
                  echo "EMOJI=✅" >> $GITHUB_ENV
                  if [[ ${{ steps.annotations.outputs.warningCount }} -gt 0 ]]; then
                    echo "EMOJI=⚠️" >> $GITHUB_ENV
                  fi
                  if [[ ${{ steps.annotations.outputs.errorCount }} -gt 0 ]]; then
                    echo "EMOJI=❌" >> $GITHUB_ENV
                  fi

            # See prettier job above for explanation of this artifact pattern.
            - name: 💾 save PR summary data for comment workflow
              if: ${{ github.event_name == 'pull_request' && always() }}
              run: |
                  mkdir -p pr-summary-data
                  echo '${{ github.event.pull_request.number }}' > pr-summary-data/pr-number
                  echo 'eslint' > pr-summary-data/section
                  printf '🚨${{ env.EMOJI }} ESLint' > pr-summary-data/title
                  cat > pr-summary-data/content << 'EOF'
                  ${{ steps.annotations.outputs.summary }}
                  EOF

            - name: 📤 upload PR summary artifact
              if: ${{ github.event_name == 'pull_request' && always() }}
              uses: actions/upload-artifact@v7
              with:
                  name: pr-summary-eslint
                  path: pr-summary-data/
                  retention-days: 1
